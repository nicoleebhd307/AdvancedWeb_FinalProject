<div class="min-h-screen bg-[#f5f7f8] flex flex-col">
  <!-- Top Nav -->
  <header class="bg-white border-b border-[#e2e8f0] px-8 py-4 flex items-center justify-between">
    <div class="flex items-center gap-3">
      <div class="bg-[#257bf4] rounded-lg w-8 h-8 flex items-center justify-center">
        <svg width="18" height="20" viewBox="0 0 18 20" fill="none" xmlns="http://www.w3.org/2000/svg">
          <path d="M2 20C1.45 20 0.979167 19.8042 0.5875 19.4125C0.195833 19.0208 0 18.55 0 18V4C0 3.45 0.195833 2.97917 0.5875 2.5875C0.979167 2.19583 1.45 2 2 2H3V0H5V2H13V0H15V2H16C16.55 2 17.0208 2.19583 17.4125 2.5875C17.8042 2.97917 18 3.45 18 4V18C18 18.55 17.8042 19.0208 17.4125 19.4125C17.0208 19.8042 16.55 20 16 20H2ZM2 18H16V8H2V18ZM2 6H16V4H2V6Z" fill="white" />
        </svg>
      </div>
      <span class="heading-sm text-[#0f172a]">UEL E-Booking</span>
    </div>
    <div class="flex items-center gap-4">
      <div *ngIf="currentUser" class="text-right">
        <p class="text-sm font-semibold text-[#1e293b] font-jakarta">{{ currentUser.email }}</p>
        <p class="text-xs text-[#64748b] font-jakarta capitalize">{{ currentUser.role }}</p>
      </div>
      <button
        (click)="logout()"
        class="bg-red-50 text-red-600 border border-red-200 px-4 py-2 rounded-lg text-sm font-jakarta font-medium hover:bg-red-100 transition-colors"
      >
        Sign Out
      </button>
    </div>
  </header>

  <!-- Content -->
  <main class="flex-1 px-8 py-10">
    <div class="max-w-4xl mx-auto">
      <h1 class="heading-lg mb-2">Dashboard</h1>
      <p class="text-[#64748b] font-jakarta text-base mb-8">
        Welcome back, <strong class="text-[#1e293b]">{{ currentUser?.email }}</strong>. You are logged in as
        <span class="capitalize font-semibold text-[#257bf4]">{{ currentUser?.role }}</span>.
      </p>

      <div class="grid grid-cols-1 md:grid-cols-3 gap-6">
        <div class="bg-white rounded-xl border border-[#e2e8f0] p-6" style="box-shadow: 0px 1px 2px 0px rgba(0,0,0,0.05);">
          <h2 class="heading-sm mb-1">Room Booking</h2>
          <p class="text-[#64748b] font-jakarta text-sm">Book a study room or lab.</p>
        </div>
        <div class="bg-white rounded-xl border border-[#e2e8f0] p-6" style="box-shadow: 0px 1px 2px 0px rgba(0,0,0,0.05);">
          <h2 class="heading-sm mb-1">My Bookings</h2>
          <p class="text-[#64748b] font-jakarta text-sm">View and manage your reservations.</p>
        </div>
        <div class="bg-white rounded-xl border border-[#e2e8f0] p-6" style="box-shadow: 0px 1px 2px 0px rgba(0,0,0,0.05);">
          <h2 class="heading-sm mb-1">Schedule</h2>
          <p class="text-[#64748b] font-jakarta text-sm">Check room availability.</p>
        </div>
      </div>
    </div>
  </main>
</div>
